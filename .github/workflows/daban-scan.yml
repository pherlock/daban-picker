name: Daban Daily Scan + VT Enhance

on:
  schedule:
    - cron: '58 21 * * 0-4'
    - cron: '13 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-and-enhance:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps + Daban Scan
        run: |
          pip install -q akshare pandas numpy requests
          echo "=== $(date '+%Y-%m-%d %H:%M:%S') 北京 ==="
          python daban_scanner.py --near-miss --ci
          echo "SCAN_DATE=$(python -c 'from datetime import date; print(date.today().strftime("%Y%m%d"))')" >> "$GITHUB_OUTPUT"
        id: scan

      - name: VT Enhance (auction + opening)
        run: |
          python daban_vt_enhance.py "$SCAN_DATE" --no-factor
        env:
          SCAN_DATE: ${{ steps.scan.outputs.SCAN_DATE }}
        continue-on-error: true

      - name: Agent Deep Analysis
        env:
          LANGCHAIN_PROVIDER: deepseek
          LANGCHAIN_MODEL_NAME: deepseek-chat
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          LANGCHAIN_TEMPERATURE: '0.0'
          TIMEOUT_SECONDS: '120'
          MAX_RETRIES: '2'
          VIBE_TRADING_ALLOWED_FILE_ROOTS: ${{ github.workspace }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY secret not set, skip agent analysis"
            exit 0
          fi
          pip install -q vibe-trading-ai 2>/dev/null
          if ! command -v vibe-trading >/dev/null 2>&1; then
            echo "vibe-trading not available, skip"
            exit 0
          fi
          vibe-trading run -p "分析 $GITHUB_WORKSPACE/enhanced_results.json 中综合评分 Top 3 的打板候选标的，结合竞价信号和 Alpha 因子评分，给出今日打板操作建议（买入时机、仓位、止损）。中文务实。" 2>&1 | tee agent_analysis.md || echo "Agent analysis completed with warnings"
        continue-on-error: true

      - name: Feishu Notification
        if: env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK secret not set, skip"
            exit 0
          fi

          # 从 enhanced_results.json 抽取 Top 3 摘要
          SUMMARY=$(python3 -c "
import json, sys
try:
    with open('enhanced_results.json') as f:
        d = json.load(f)
except Exception:
    print('暂无增强数据')
    sys.exit(0)

s = d.get('summary', {})
lines = [f\"📊 {d['date']} 打板扫描 · {s.get('total_limit_ups',0)}涨停 → {s.get('candidates',0)}候选/{s.get('near_miss',0)}近失\"]
lines.append('')

top = d.get('top_picks', [])[:3]
if not top:
    lines.append('😔 今日无高分候选')
else:
    for i, t in enumerate(top):
        code = t.get('code','')
        name = t.get('name','')
        price = t.get('price','-')
        pct = t.get('change_pct','-')
        score = t.get('enhanced_score',0)
        auction = t.get('auction',{})
        sigs = auction.get('signals',[])
        sig_str = ' '.join(sigs[:3]) if sigs else ''
        lines.append(f\"{'🥇🥈🥉'[i]} {code} {name}  ¥{price}  +{pct}%  综合{score}分\")
        if sig_str:
            lines.append(f\"   {sig_str}\")

print('\n'.join(lines))
" 2>&1)

          if [ -z "$SUMMARY" ]; then
            echo "No summary to send"
            exit 0
          fi

          # 发送飞书卡片消息
          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "
import json
summary = '''$SUMMARY'''
card = {
    'msg_type': 'interactive',
    'card': {
        'header': {
            'title': {'content': '🎯 今日打板扫描', 'tag': 'plain_text'},
            'template': 'blue'
        },
        'elements': [
            {'tag': 'div', 'text': {'tag': 'lark_md', 'content': summary}},
            {'tag': 'hr'},
            {'tag': 'note', 'elements': [
                {'tag': 'plain_text', 'content': 'Daban Bot · 每个交易日 10:30 自动推送'}
            ]}
        ]
    }
}
print(json.dumps(card, ensure_ascii=False))
" 2>&1)" 2>&1 || echo "Feishu notification failed (non-critical)"
        continue-on-error: true

      - name: Commit results
        if: always()
        run: |
          git config user.name "Daban Bot"
          git config user.email "bot@daban.local"
          git add scan_results.json enhanced_results.json agent_analysis.md 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "auto: $(date '+%m/%d %H:%M') 打板+VT增强 [skip ci]" && git push || true)
